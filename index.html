<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rafa Play</title>
<link rel="icon" href="./assets/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <div style="text-align:center">
        <img src="assets/logo.png" style="height:150px">
        <h1 style="font-size:50px;background:linear-gradient(to right,#ff00ff,#00ccff,#ff66ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Rafa Play</h1>
    </div>
    <div style="text-align:center;margin:10px;">
        <button onclick="openLogin()">Compte</button>
        <button onclick="openUpload()">Upload</button>
    </div>
</header>

<div style="padding:20px">
    <div id="videoGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px"></div>
</div>

<!-- MODAL COMPTE -->
<div id="loginModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;">
    <div style="background:#111;padding:20px;border-radius:12px;width:300px;margin:auto;">
        <h3>Créer un compte</h3>
        <input id="username" placeholder="Username">
        <input id="password" placeholder="Password" type="password">
        <input id="userLogo" type="file" accept="image/*">
        <button onclick="register()">Créer</button>
        <button onclick="closeLogin()">Fermer</button>
    </div>
</div>

<!-- MODAL UPLOAD -->
<div id="uploadModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;">
    <div style="background:#111;padding:20px;border-radius:12px;width:300px;margin:auto;">
        <h3>Upload Vidéo</h3>
        <input id="title" placeholder="Titre">
        <input id="thumbnail" type="file" accept="image/*">
        <input id="videoFile" type="file" accept="video/*">
        <button onclick="uploadVideo()">Publier</button>
        <button onclick="closeUpload()">Fermer</button>
    </div>
</div>

<script src="supabase.js"></script>
<script src="script.js"></script>
</body>
</html>
