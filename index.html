<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rafa Play</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
<link rel="shortcut icon" type="image/x-icon" href="./assets/favicon.ico">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>
</head>
<body>

<header class="header">
    <div class="logo-container">
        <img src="assets/logo.png" class="logo">
        <h1 class="main-title">Rafa Play</h1>
    </div>
    <div class="header-buttons">
        <button onclick="openLogin()">Compte</button>
        <button onclick="openUpload()">Upload</button>
    </div>
</header>

<div class="container">
    <h2>🔥 Vidéos</h2>
    <div id="videoGrid" class="grid"></div>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
    <div class="box">
        <h3>Créer un compte</h3>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <input type="file" id="userLogo" accept="image/*">
        <button onclick="register()">Créer</button>
        <button onclick="closeLogin()">Fermer</button>
    </div>
</div>

<!-- UPLOAD MODAL -->
<div class="modal" id="uploadModal">
    <div class="box">
        <h3>Upload vidéo</h3>
        <input type="text" id="title" placeholder="Titre">
        <input type="file" id="thumbnail" accept="image/*">
        <input type="file" id="videoFile" accept="video/*">
        <button onclick="uploadVideo()">Publier</button>
        <button onclick="closeUpload()">Fermer</button>
    </div>
</div>

</body>
</html>
