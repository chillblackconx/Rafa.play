<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rafa Play</title>

<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <img src="assets/logo.png" class="logo">

    <div class="nav">
        <div id="navHome" class="button">Home</div>
        <div id="navLogin" class="button">Login</div>
        <div id="navUpload" class="button">Upload</div>
    </div>
</header>

<!-- PAGE HOME -->
<div id="pageHome" class="page">
    <h1>Bienvenue sur Rafa Play</h1>
    <div id="videoGrid"></div>
</div>

<!-- PAGE LOGIN -->
<div id="pageLogin" class="page" style="display:none;">
    <h2>Connexion</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <div id="doLogin" class="button">Se connecter</div>
</div>

<!-- PAGE UPLOAD -->
<div id="pageUpload" class="page" style="display:none;">
    <h2>Upload</h2>
    <input id="videoTitle" placeholder="Titre">
    <input type="file" id="videoFile">
    <div id="doUpload" class="button">Publier</div>
</div>

<script src="script.js"></script>
</body>
</html>
