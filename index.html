<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rafa Play</title>

<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <img src="assets/logo.png" class="logo">
    
    <div id="authArea"></div>
    
    <div class="headerButtons">
        <div id="loginBtn" class="button">Login</div>
        <div id="signupBtn" class="button">Sign Up</div>
        <div id="logoutBtn" class="button" style="display:none;">Logout</div>
        <div id="openUpload" class="button">Upload</div>
    </div>
</header>

<div id="videoGrid"></div>

<!-- Upload Modal -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>Upload</h2>
        <input type="text" id="videoTitle" placeholder="Titre">
        <input type="file" id="videoFile" accept="video/*">
        <div id="publish" class="button">Publier</div>
        <div id="closeUpload" class="button">Fermer</div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
