<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rafa Play</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="assets/logo.png" class="logo">
    <button id="openUpload" class="button">Upload</button>
</header>

<div id="videoGrid"></div>

<!-- MODAL -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>Upload Video</h2>

        <input type="text" id="videoTitle" placeholder="Titre">
        <input type="text" id="videoThumbnail" placeholder="Lien image">
        <input type="text" id="videoUrl" placeholder="Lien vidéo">

        <br><br>
        <button id="saveVideo" class="button">Publier</button>
        <button id="closeUpload" class="button">Fermer</button>
    </div>
</div>

<!-- IMPORTANT : script à la FIN -->
<script src="script.js"></script>

</body>
</html>
